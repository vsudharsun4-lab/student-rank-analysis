<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRank AI - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        :root {
            --bg: #f7f7f2;
            --panel: #fffffb;
            --text: #172024;
            --text-soft: #5b6770;
            --line: #d7dfd6;
            --brand: #0f9d7a;
            --brand-3: #2e6fff;
            --danger: #c93838;
            --success: #1f8f5f;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 12% 10%, rgba(15, 157, 122, 0.18), transparent 30%), radial-gradient(circle at 86% 0%, rgba(46, 111, 255, 0.16), transparent 26%), var(--bg);
            color: var(--text);
            font-family: "IBM Plex Sans", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .aurora {
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(46, 111, 255, 0.07), rgba(15, 157, 122, 0.06));
            filter: blur(60px);
            pointer-events: none;
            z-index: -2;
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image: linear-gradient(rgba(23, 32, 36, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(23, 32, 36, 0.03) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .signup-container {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 45px rgba(31, 50, 37, 0.08);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 1.6rem;
        }

        .signup-mark {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            background: linear-gradient(140deg, var(--brand), var(--brand-3));
            margin: 0 auto 0.8rem;
        }

        .signup-header h1 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.7rem;
        }

        .signup-header p {
            margin: 0.4rem 0 0;
            color: var(--text-soft);
            font-size: 0.92rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            font-family: inherit;
            background: #fafaf8;
            color: var(--text);
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--brand);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(15, 157, 122, 0.1);
        }

        .error-message {
            background: rgba(201, 56, 56, 0.1);
            color: var(--danger);
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-left: 3px solid var(--danger);
        }

        .submit-btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-3) 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(46, 111, 255, 0.2);
        }

        .auth-switch {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-soft);
        }

        .auth-switch a {
            color: var(--brand-3);
            text-decoration: none;
            font-weight: 600;
        }

        .student-select-group {
            display: none;
        }

        .student-select-group.show {
            display: block;
        }

        @media (max-width: 540px) {
            .signup-container {
                padding: 1.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="aurora" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <div class="signup-container">
        <div class="signup-header">
            <div class="signup-mark">EA</div>
            <h1>Create Account</h1>
            <p>Sign up with your own login ID and password</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="grid">
                <div class="form-group full">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Your full name">
                </div>

                <div class="form-group full">
                    <label for="email">Email (Login ID)</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>

                <div class="form-group full">
                    <label for="user_type">Account Type</label>
                    <select id="user_type" name="user_type" required>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group full student-select-group" id="studentSelectGroup">
                    <label for="student_select">Student Profile</label>
                    <select id="student_select" name="student_select">
                        <option value="">-- Select your student name --</option>
                        {% for student_name in student_names %}
                        <option value="{{ student_name }}">{{ student_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="Minimum 6 characters">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Re-enter password">
                </div>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>

    <script>
        const userType = document.getElementById("user_type");
        const studentGroup = document.getElementById("studentSelectGroup");
        const studentSelect = document.getElementById("student_select");

        function toggleStudentProfile() {
            if (userType.value === "student") {
                studentGroup.classList.add("show");
                studentSelect.required = true;
            } else {
                studentGroup.classList.remove("show");
                studentSelect.required = false;
                studentSelect.value = "";
            }
        }

        userType.addEventListener("change", toggleStudentProfile);
        toggleStudentProfile();
    </script>
</body>
</html>

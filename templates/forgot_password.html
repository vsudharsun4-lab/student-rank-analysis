<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRank AI - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        :root {
            --bg: #f7f7f2;
            --panel: #fffffb;
            --text: #172024;
            --text-soft: #5b6770;
            --line: #d7dfd6;
            --brand: #0f9d7a;
            --brand-3: #2e6fff;
            --danger: #c93838;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 12% 10%, rgba(15, 157, 122, 0.18), transparent 30%), radial-gradient(circle at 86% 0%, rgba(46, 111, 255, 0.16), transparent 26%), var(--bg);
            color: var(--text);
            font-family: "IBM Plex Sans", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .aurora {
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(46, 111, 255, 0.07), rgba(15, 157, 122, 0.06));
            filter: blur(60px);
            pointer-events: none;
            z-index: -2;
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image: linear-gradient(rgba(23, 32, 36, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(23, 32, 36, 0.03) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .reset-container {
            width: 100%;
            max-width: 460px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 45px rgba(31, 50, 37, 0.08);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .reset-mark {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(140deg, var(--brand), var(--brand-3));
            margin: 0 auto 0.8rem;
        }

        .reset-header h1 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.65rem;
        }

        .reset-header p {
            margin: 0.4rem 0 0;
            color: var(--text-soft);
            font-size: 0.92rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            font-family: inherit;
            background: #fafaf8;
            color: var(--text);
        }

        input:focus {
            outline: none;
            border-color: var(--brand);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(15, 157, 122, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-3) 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .error-message {
            background: rgba(201, 56, 56, 0.1);
            color: var(--danger);
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-left: 3px solid var(--danger);
        }

        .auth-switch {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-soft);
        }

        .auth-switch a {
            color: var(--brand-3);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="aurora" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <div class="reset-container">
        <div class="reset-header">
            <div class="reset-mark">EA</div>
            <h1>Forgot Password</h1>
            <p>Reset your password using your registered email</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">Registered Email (Login ID)</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="Minimum 6 characters">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Re-enter new password">
            </div>

            <button type="submit" class="submit-btn">Reset Password</button>
        </form>

        <p class="auth-switch">
            Back to <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</body>
</html>
